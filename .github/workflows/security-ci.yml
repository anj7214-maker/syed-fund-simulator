name: Security CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "30 23 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-audit:
    name: Build and dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
